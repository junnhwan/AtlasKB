services:
  mysql:
    image: mysql:8.0.37
    container_name: atlas-kb-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: atlas_kb
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    command:
      - --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    volumes:
      - atlas-kb-mysql-data:/var/lib/mysql
      - ./src/main/resources/db/ddl.sql:/docker-entrypoint-initdb.d/01-ddl.sql:ro
    networks:
      - atlas-kb-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p123456"]
      interval: 15s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.0.11-alpine
    container_name: atlas-kb-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - atlas-kb-redis-data:/data
    networks:
      - atlas-kb-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    container_name: atlas-kb-elasticsearch
    restart: unless-stopped
    environment:
      node.name: atlas-kb-es
      cluster.name: atlas-kb-cluster
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
      xpack.security.enabled: "false"
      xpack.security.enrollment.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      xpack.security.transport.ssl.enabled: "false"
      http.cors.enabled: "true"
      http.cors.allow-origin: "*"
      action.destructive_requires_name: "false"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - atlas-kb-es-data:/usr/share/elasticsearch/data
    networks:
      - atlas-kb-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2023-05-18T00-05-36Z
    container_name: atlas-kb-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BROWSER: "on"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - atlas-kb-minio-data:/data
      - atlas-kb-minio-config:/root/.minio
    networks:
      - atlas-kb-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: atlas-kb-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    ports:
      - "2181:2181"
    volumes:
      - atlas-kb-zk-data:/var/lib/zookeeper/data
      - atlas-kb-zk-log:/var/lib/zookeeper/log
    networks:
      - atlas-kb-network
    healthcheck:
      test: ["CMD-SHELL", "echo stat | nc localhost 2181"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: atlas-kb-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DELETE_TOPIC_ENABLE: "true"
    ports:
      - "9092:9092"
    volumes:
      - atlas-kb-kafka-data:/var/lib/kafka/data
    networks:
      - atlas-kb-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 10

networks:
  atlas-kb-network:
    driver: bridge

volumes:
  atlas-kb-mysql-data:
  atlas-kb-redis-data:
  atlas-kb-es-data:
  atlas-kb-minio-data:
  atlas-kb-minio-config:
  atlas-kb-zk-data:
  atlas-kb-zk-log:
  atlas-kb-kafka-data:
