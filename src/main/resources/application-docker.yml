spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:mysql://mysql:3306/atlas_kb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: redis
      port: 6379
      password:
  kafka:
    bootstrap-servers: kafka:29092
  webflux:
    client:
      max-in-memory-size: 16MB

minio:
  endpoint: http://minio:9000
  access-key: minioadmin
  secret-key: minioadmin
  public-url: http://localhost:9000

elasticsearch:
  host: elasticsearch
  port: 9200
  scheme: http
  username:
  password:

logging:
  level:
    org.springframework.web: INFO
    org.springframework.security: INFO
    io.hwan.atlaskb: INFO
